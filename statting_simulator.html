<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  <link rel="stylesheet" href="main.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Toram Tier-4 Statting Simulator</title>
</head>

<body onload="document.getElementById('recipe_pot').value = DEFAULT_WEAPON_RECIPE_POT; App.loadSettings(); App.loadFromStorage();" class="container">
    <div style="text-align: right; width: 100%; color: blue; font-size: 8pt">by Lil☆Neko</div>
    <h2 id="title" style="text-align: center; color: blue">Statting Simulator</h2>
    <center>
        <div class="card p-2 ">
            <button class="m-1" style="position: absolute; color: green; font-size: 8px; top: 2px; right: 1px; background: none; border: none" id="myBtn">[settings]</button>
				<div id="myModal" class="modal">
				  <!-- Modal content -->
				  <div class="modal-content">
					<span class="close">&times;</span>
					<div>
                    <div class="d-flex flex-row">
                        <div class="m-1" style="width: 100px;">Proficiency: </div>
                        <div class="m-1" ><input style="width: 100px;" type="number" id="proficiency" min="0" value=0></select></div>
                    </div>
                    <div class="d-flex flex-row">
                        <div>
                            <label style="width: 100px;">
                                TEC: 
                            </label>
                        </div>
                        
                        <div>
                            <input style="width: 100px;" type="number" value=255 id='tec' min="0" max="255"></input>
                        </div>
                    </div>
                </div>
		</div>
			
			
				
            </div>
            <div class="mt-3 ">
                <div class="d-flex flex-row mb-1 flex-wrap justify-content-center">
                    <div class="align-self-center mr-2" style="width: 180px;">
                        Equipment type:
                    </div>
                    <div>
                        <select  style="width: 180px;" class="form-control" id="weap_arm" onchange="if (this.value === 'w') document.getElementById('recipe_pot').value = DEFAULT_WEAPON_RECIPE_POT; else document.getElementById('recipe_pot').value = DEFAULT_ARMOR_RECIPE_POT;"><option value='w'>Weapon</option><option value='a'>Armor</option></select>
                    </div>
                </div>
                <div class="d-flex flex-row mb-1 flex-wrap justify-content-center">
                    <div class="align-self-center mr-2" style="width: 180px;">Recipe Potential: </div>
                    <div>
                        <input style="width: 180px;" class="form-control" type="number" value=40 id='recipe_pot'></input>
                    </div>
                </div>
                <div class="d-flex flex-row mb-1 flex-wrap justify-content-center">
                    <div class="align-self-center mr-2" style="width: 180px;">
                        Starting Potential: 
                    </div>
                    <div  style="width: 180px;">
                        <input  class="form-control" type="number" value=89 id='starting_pot'></input>
                    </div>
                </div>
            <button onclick="App.spawn()" class="btn btn-primary shadow">Go!</button>&nbsp;&nbsp;
            <button onclick="show_help()" class="btn btn-info shadow">Hotkeys</button>
        </div>
    </center>
    <div class="card my-1">
        <div class="m-2" hidden id="navigation_bar"></div>
    </div>
    <div id="workbench" hidden>
            <div class="d-flex justify-content-center flex-wrap p-1">
                <div class="workbench col-md-7 mr-2">
                    <div>
                        <div id='stat-details' style=" color: green;"></div>
                        <div id='workspace'></div>
                    </div>
                </div>

                <div class= "workbench col-md-4" id='material_display'>
                    
                </div>
            </div>  
            
            <div class="d-flex justify-content-center card  m-1 p-3">
                <div class= "workbench" style="vertical-align: top" id="formula_display">
                    
                </div>
            </div>
        
    </div>
    <div>
        <div>
            <div class="m-1 d-flex flex-row justify-content-between flex-wrap">
                <div class="m-1"style="text-align: left">
                    <button onclick="App.reset()" class="btn btn-danger">Reset</button>
                </div>
                <div class="d-flex flex-row flex-wrap" style="text-align: right">
                    <button onclick="App.promptRename()" id="rename_button" class="btn btn-primary m-1">Rename Current Stat</button>
                    <button onclick="App.duplicateCurrent()" id="duplicate_button" class="btn btn-secondary m-1">Duplicate Current Stat</button>
                </div>
            </div>
        </div>
    </div>
<!-- Script for Popup-->
<script>
var modal = document.getElementById("myModal");
var btn = document.getElementById("myBtn");
var span = document.getElementsByClassName("close")[0]; 
btn.onclick = function() {
  modal.style.display = "block";
}
span.onclick = function() {
  modal.style.display = "none";
}
window.onclick = function(event) {
  if (event.target == modal) {
    modal.style.display = "none";
  }
}
</script>
<!-- Main Script For Statting-->
    <script src="js/t4stat.js" type="text/javascript"></script>
    <script src="js/math.js" type="text/javascript"></script>
<!-- Bootstrp dependency  -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
</body>
